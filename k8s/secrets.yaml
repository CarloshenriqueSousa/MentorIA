# ⚠️  NUNCA commite secrets reais. Use Sealed Secrets, SOPS ou um vault externo.
#     Gere os valores com:  echo -n 'valor' | base64
apiVersion: v1
kind: Secret
metadata:
  name: mentoria-secrets
  namespace: mentoria
  labels:
    app.kubernetes.io/part-of: mentoria
type: Opaque
data:
  # jdbc:postgresql://db.SEUREF.supabase.co:5432/postgres?sslmode=require
  DATABASE_URL: REPLACE_WITH_BASE64

  DATABASE_USER: REPLACE_WITH_BASE64

  DATABASE_PASSWORD: REPLACE_WITH_BASE64

  JWT_SECRET: REPLACE_WITH_BASE64

  ANTHROPIC_API_KEY: REPLACE_WITH_BASE64

  STRIPE_SECRET_KEY: REPLACE_WITH_BASE64

  STRIPE_WEBHOOK_SECRET: REPLACE_WITH_BASE64

  STRIPE_PRICE_BASIC: REPLACE_WITH_BASE64

  STRIPE_PRICE_PREMIUM: REPLACE_WITH_BASE64

  SUPABASE_URL: REPLACE_WITH_BASE64

  SUPABASE_KEY: REPLACE_WITH_BASE64

  SUPABASE_SERVICE_ROLE_KEY: REPLACE_WITH_BASE64

  SUPABASE_JWT_SECRET: REPLACE_WITH_BASE64
