apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mentoria
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: mentoria
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/name: frontend
    spec:
      containers:
        - name: frontend
          image: mentoria/frontend:latest    # Substitua pelo seu registry
          ports:
            - containerPort: 3000
          env:
            - name: NUXT_PUBLIC_API_BASE
              value: "/api"    # Relativo — Ingress faz o proxy
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mentoria-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_KEY
              valueFrom:
                secretKeyRef:
                  name: mentoria-secrets
                  key: SUPABASE_KEY
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: mentoria
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: mentoria
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
