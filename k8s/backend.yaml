apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mentoria
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: mentoria
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: backend
          image: mentoria/backend:latest    # Substitua pelo seu registry
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: mentoria-config
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mentoria-secrets
                  key: DATABASE_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mentoria-secrets
                  key: JWT_SECRET
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mentoria-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: mentoria-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: STRIPE_PRICE_BASIC
              valueFrom:
                secretKeyRef:
                  name: mentoria-secrets
                  key: STRIPE_PRICE_BASIC
            - name: STRIPE_PRICE_PREMIUM
              valueFrom:
                secretKeyRef:
                  name: mentoria-secrets
                  key: STRIPE_PRICE_PREMIUM
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mentoria-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_KEY
              valueFrom:
                secretKeyRef:
                  name: mentoria-secrets
                  key: SUPABASE_KEY
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: mentoria-secrets
                  key: SUPABASE_SERVICE_ROLE_KEY
                  optional: true
            - name: SUPABASE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mentoria-secrets
                  key: SUPABASE_JWT_SECRET
                  optional: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1536Mi
          readinessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          startupProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            failureThreshold: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: mentoria
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: mentoria
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: mentoria
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
