apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: mentoria
  labels:
    app.kubernetes.io/name: ai-service
    app.kubernetes.io/part-of: mentoria
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
        app.kubernetes.io/name: ai-service
    spec:
      containers:
        - name: ai-service
          image: mentoria/ai-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: mentoria-config
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mentoria-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: mentoria
  labels:
    app.kubernetes.io/name: ai-service
    app.kubernetes.io/part-of: mentoria
spec:
  type: ClusterIP
  selector:
    app: ai-service
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-service-hpa
  namespace: mentoria
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
