apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: mentoria
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: mentoria
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: mentoria
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: mentoria
spec:
  replicas: 1
  strategy:
    type: Recreate          # PVC é ReadWriteOnce — não aceita rolling update
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: mentoria
            - name: POSTGRES_USER
              value: mentoria
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mentoria-secrets
                  key: DATABASE_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "mentoria", "-d", "mentoria"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "mentoria", "-d", "mentoria"]
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: mentoria
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: mentoria
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
