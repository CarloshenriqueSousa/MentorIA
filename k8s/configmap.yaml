apiVersion: v1
kind: ConfigMap
metadata:
  name: mentoria-config
  namespace: mentoria
  labels:
    app.kubernetes.io/part-of: mentoria
data:
  # ── Database ──
  DATABASE_URL: "jdbc:postgresql://postgres:5432/mentoria"
  DATABASE_USER: "mentoria"

  # ── Internal services ──
  AI_SERVICE_URL: "http://ai-service:8000"
  ALLOWED_ORIGINS: "http://backend:8080"

  # ── Frontend / CORS ──
  CORS_ORIGINS: "https://mentoria.example.com,http://localhost:3001"

  # ── AI model ──
  CLAUDE_MODEL: "claude-3-5-sonnet-latest"

  # ── Java opts ──
  JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
