apiVersion: v1
kind: ConfigMap
metadata:
  name: mentoria-config
  namespace: mentoria
  labels:
    app.kubernetes.io/part-of: mentoria
data:
  # ── Spring profile ──
  SPRING_PROFILES_ACTIVE: "prod"

  # ── Internal services ──
  AI_SERVICE_URL: "http://ai-service:8000"

  # ── Frontend CORS (origins that browsers send) ──
  CORS_ORIGINS: "https://mentoria.example.com,http://localhost:3001"

  # ── AI Service CORS (only backend calls it internally, but env is used) ──
  ALLOWED_ORIGINS: "http://backend:8080"

  # ── AI model ──
  CLAUDE_MODEL: "claude-3-5-sonnet-latest"

  # ── Java opts ──
  JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
