spring:
  application:
    name: mentoria-backend

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

jwt:
  secret: ${JWT_SECRET:MentorIASecretKeyMustBeAtLeast256BitsLongForSecurity}
  expiration: 86400000
  refresh-expiration: 604800000

ai-service:
  url: ${AI_SERVICE_URL:http://localhost:8000}

# Supabase (API / integrações; o JDBC continua em spring.datasource.*)
supabase:
  url: ${SUPABASE_URL:}
  key: ${SUPABASE_KEY:}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
  jwt-secret: ${SUPABASE_JWT_SECRET:}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  price-basic: ${STRIPE_PRICE_BASIC:price_placeholder}
  price-premium: ${STRIPE_PRICE_PREMIUM:price_placeholder}

freemium:
  daily-message-limit: 10
  monthly-plan-limit: 2

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

# Usuário local de teste (POST /auth/login). Desative em produção.
app:
  seed:
    test-user:
      enabled: true
      email: teste@gmail.com
      password: teste123
      name: Usuário Teste
      user-email: teste2@gmail.com
      user-password: teste123
      user-name: Usuário Teste 2
      user-completed-onboarding: true

management:
  endpoints:
    web:
      exposure:
        include: health,info