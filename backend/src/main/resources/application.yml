spring:
  application:
    name: mentoria-backend

  docker:
    compose:
      enabled: ${DOCKER_COMPOSE_ENABLED:false}
      file: ../docker-compose.yml
      lifecycle-management: start_only

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/mentoria}
    username: ${DATABASE_USER:mentoria}
    password: ${DATABASE_PASSWORD:mentoria}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10

  sql:
    init:
      mode: always
      schema-locations: classpath:db/pre-jpa-repair.sql

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

jwt:
  secret: ${JWT_SECRET:MentorIASecretKeyMustBeAtLeast256BitsLongForSecurity}
  expiration: 86400000
  refresh-expiration: 604800000

ai-service:
  url: ${AI_SERVICE_URL:http://localhost:8000}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  price-basic: ${STRIPE_PRICE_BASIC:price_placeholder}
  price-premium: ${STRIPE_PRICE_PREMIUM:price_placeholder}

freemium:
  daily-message-limit: 10
  monthly-plan-limit: 2

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://127.0.0.1:3001}

# Usuário local de teste (POST /auth/login). Desative em produção.
app:
  seed:
    test-user:
      enabled: true
      email: teste@gmail.com
      password: teste123
      name: Usuário Teste
      user-email: teste2@gmail.com
      user-password: teste123
      user-name: Usuário Teste 2
      user-completed-onboarding: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
