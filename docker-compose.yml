services:
  postgres:
    image: postgres:16-alpine
    container_name: mentoria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mentoria
      POSTGRES_USER: mentoria
      POSTGRES_PASSWORD: mentoria
    ports:
      - "5432:5432"
    volumes:
      - mentoria_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentoria -d mentoria"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: mentoria-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/mentoria?sslmode=disable
      DATABASE_USER: mentoria
      DATABASE_PASSWORD: mentoria
      JWT_SECRET: MentorIASecretKeyMustBeAtLeast256BitsLongForSecurity
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://127.0.0.1:3001
      AI_SERVICE_URL: http://host.docker.internal:8000
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      STRIPE_PRICE_BASIC: price_placeholder
      STRIPE_PRICE_PREMIUM: price_placeholder

volumes:
  mentoria_pg_data:
